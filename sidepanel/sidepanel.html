<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Winday Meet</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div id="app">
      <!-- Signed-out view -->
      <section id="signin" class="hidden">
        <div class="signin-hero">
          <div class="brand">
            <img src="../icons/icon48.png" width="22" height="22" alt="" />
            <span>Winday Meet</span>
          </div>
          <p class="muted signin-lead">Connectez-vous à votre compte Winday pour enregistrer, transcrire et résumer vos appels.</p>
          <button id="btn-web-signin" class="primary block">Se connecter avec Winday</button>
          <p id="signin-hint" class="hint">Une fenêtre Winday s'ouvre pour la connexion — connectez-vous, puis revenez ici.</p>
          <a href="#" id="toggle-email" class="link small">Se connecter par e-mail</a>
          <div id="email-form" class="hidden">
            <input id="email" type="email" placeholder="Email" autocomplete="username" />
            <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password" />
            <div id="auth-error" class="error small hidden"></div>
            <div class="row">
              <button id="btn-signin" class="primary">Se connecter</button>
              <button id="btn-signup" class="ghost">Créer un compte</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Signed-in view -->
      <section id="main" class="hidden">
        <header>
          <div class="brand">
            <img src="../icons/icon48.png" width="18" height="18" alt="" />
            <span>Winday Meet</span>
          </div>
          <div class="header-right">
            <span id="user-email" class="muted small"></span>
            <button id="btn-settings" class="icon" title="Réglages">⚙</button>
            <button id="btn-close" class="icon hidden" title="Fermer le panneau">✕</button>
          </div>
        </header>

        <div id="mic-banner" class="banner hidden">
          <div>🎤 Micro non activé — <a href="#" id="mic-link">l'activer</a> pour capter votre voix.</div>
          <div id="mic-banner-error" class="error small hidden" style="margin-top: 4px"></div>
        </div>

        <div id="recorder" class="recorder card"></div>

        <div class="section-title">Enregistrements</div>
        <div id="list" class="list"></div>

        <footer>
          <button id="btn-signout" class="ghost small">Se déconnecter</button>
        </footer>
      </section>
    </div>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
